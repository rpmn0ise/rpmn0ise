name: Latest blog post workflow

on:
  schedule:
    # S'exécute automatiquement toutes les 6 heures
    - cron: '0 */6 * * *'
  workflow_dispatch: # Te permet de le lancer manuellement depuis l'onglet Actions
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://rpmn0ise.github.io/feed.xml"
          max_post_count: 4
          date_format: "mmm d, yyyy"
          template: "- [$title]($url) · <kbd>$date</kbd><br><br>"
          commit_message: "docs(readme): update latest blog posts"
          committer_username: github-actions[bot]
          committer_email: github-actions[bot]@users.noreply.github.com

      - name: Fix blog post links rendering
        run: |
          python3 - <<'EOF'
          import re

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          pattern = r'(<!-- BLOG-POST-LIST:START -->)(.*?)(<!-- BLOG-POST-LIST:END -->)'
          match = re.search(pattern, content, re.DOTALL)

          if match:
              block = match.group(2)
              # Remplace <br><br> et <br> par de vrais sauts de ligne Markdown
              block = re.sub(r'<br><br>', '\n\n', block)
              block = re.sub(r'<br>', '\n\n', block)
              # Assure une ligne vide propre autour du contenu
              block = '\n' + block.strip() + '\n\n'
              content = content[:match.start(2)] + block + content[match.end(2):]

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(content)

          print("Done - blog post links fixed.")
          EOF

      - name: Commit fixed README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs(readme): fix blog post links rendering"
          git push
